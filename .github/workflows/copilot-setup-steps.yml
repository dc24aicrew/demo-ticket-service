name: "Copilot Setup Steps"

# Allow testing of the setup steps from your repository's "Actions" tab.
on: workflow_dispatch

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission.
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-repo-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-repo

      - name: Cache Maven wrapper
        uses: actions/cache@v4
        with:
          path: ~/.m2/wrapper
          key: ${{ runner.os }}-m2-wrapper-${{ hashFiles('**/.mvn/wrapper/**') }}
          restore-keys: ${{ runner.os }}-m2-wrapper
      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Download dependencies and compile
        run: ./mvnw dependency:go-offline compile test-compile

      - name: Run tests to ensure environment is working
        run: ./mvnw test -Dspring.profiles.active=test

      - name: Install additional development tools
        run: |
          # Install useful CLI tools for development
          sudo apt-get update
          sudo apt-get install -y curl jq git tree

      - name: Verify Java environment
        run: |
          echo "Java version:"
          java -version
          echo "Maven version:"
          ./mvnw -version
          echo "Project structure:"
          tree -L 3 -I 'target|.git'

      - name: Setup application properties for development
        run: |
          echo "Creating development application properties..."
          cp src/main/resources/application.properties src/main/resources/application-dev.properties || true
          echo "Development environment configured successfully"

      - name: Pre-warm Maven repository
        run: |
          echo "Pre-warming Maven repository with common plugins..."
          ./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout
          ./mvnw clean --quiet

      - name: Display environment summary
        run: |
          echo "=== Copilot Environment Setup Complete ==="
          echo "✅ Java 21 installed and configured"
          echo "✅ Maven dependencies downloaded and cached"
          echo "✅ Project compiled successfully"
          echo "✅ Tests passing"
          echo "✅ Development tools installed"
          echo "Ready for Copilot coding agent!"