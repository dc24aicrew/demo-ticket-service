  notification:
    name: Notifications
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Added timeout
    needs: [test, build, security-scan]
    if: always()

    steps:
      - name: Notify on success
        if: needs.test.result == 'success' && needs.build.result == 'success'
        run: |
          echo "✅ Build completed successfully!"

